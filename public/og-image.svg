<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Ciniverse OG Image</title>
  <desc id="desc">Ciniverse movie discovery and streaming platform social share image</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b0c10"/>
      <stop offset="55%" stop-color="#151821"/>
      <stop offset="100%" stop-color="#1f1114"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#ff4b4b"/>
      <stop offset="100%" stop-color="#b00610"/>
