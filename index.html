<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ciniverse | Discover Movies & Watch Licensed Streams</title>
    <meta
      name="description"
      content="Ciniverse helps you discover trending movies, watch trailers, and access licensed streaming options in one cinematic experience."
    />
    <meta
      name="keywords"
      content="Ciniverse, movies, movie discovery, trailers, licensed streaming, trending movies, top rated movies"
    />
    <meta name="author" content="Ciniverse" />
    <meta name="application-name" content="Ciniverse" />
    <meta name="theme-color" content="#0f0f10" />
    <meta name="color-scheme" content="dark light" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="googlebot" content="index, follow, max-image-preview:large" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="format-detection" content="telephone=no" />

    <link rel="canonical" href="https://ciniverse.top/" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/site.webmanifest" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Ciniverse" />
    <meta property="og:title" content="Ciniverse | Discover Movies & Watch Licensed Streams" />
    <meta
      property="og:description"
      content="Discover trending films, explore top-rated picks, watch trailers, and find licensed streaming options on Ciniverse."
    />
    <meta property="og:url" content="https://ciniverse.top/" />
    <meta property="og:image" content="https://ciniverse.top/og-image.svg" />
    <meta property="og:image:alt" content="Ciniverse movie discovery platform banner" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Ciniverse | Discover Movies & Watch Licensed Streams" />
    <meta
      name="twitter:description"
      content="Find trending movies, watch trailers, and access licensed streaming options on Ciniverse."
    />
    <meta name="twitter:image" content="https://ciniverse.top/og-image.svg" />
    <meta name="twitter:image:alt" content="Ciniverse movie discovery platform banner" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Ciniverse",
        "url": "https://ciniverse.top/",
        "description": "Movie discovery and licensed streaming experience with trailers and curated categories.",
        "inLanguage": "en-US",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://ciniverse.top/search?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Ciniverse",
        "url": "https://ciniverse.top/",
        "applicationCategory": "EntertainmentApplication",
        "operatingSystem": "Web",
        "description": "Discover popular movies, watch trailers, and stream licensed titles."
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
