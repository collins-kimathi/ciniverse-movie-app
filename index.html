<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ciniverse</title>
    <meta
      name="description"
      content="Ciniverse lets you watch trailers, rate what you have watched, and post ReelNotes for everyone to read."
    />
    <meta
      name="keywords"
      content="Ciniverse, ReelNotes, movie notes, movie ratings, movie suggestions, trailers, movie discovery, trending movies"
    />
    <meta name="author" content="Ciniverse" />
    <meta name="application-name" content="Ciniverse" />
    <meta name="theme-color" content="#0f0f10" />
    <meta name="color-scheme" content="dark light" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="googlebot" content="index, follow, max-image-preview:large" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="format-detection" content="telephone=no" />

    <link rel="canonical" href="https://ciniverse-movie-app.vercel.app/" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/site.webmanifest" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Ciniverse" />
    <meta property="og:title" content="Ciniverse " />
    <meta
      property="og:description"
      content="Discover movies, watch trailers, add your ratings, and share ReelNotes with other movie lovers."
    />
    <meta property="og:url" content="https://ciniverse-movie-app.vercel.app/" />
    <meta
      property="og:image"
      content="https://ciniverse-movie-app.vercel.app/og-image.svg"
    />
    <meta
      property="og:image:alt"
      content="Ciniverse movie discovery platform banner"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Ciniverse | ReelNotes, Trailers, Ratings & Notes"
    />
    <meta
      name="twitter:description"
      content="Watch trailers, rate movies you have seen, and post ReelNotes on Ciniverse."
    />
    <meta
      name="twitter:image"
      content="https://ciniverse-movie-app.vercel.app/og-image.svg"
    />
    <meta
      name="twitter:image:alt"
      content="Ciniverse movie discovery platform banner"
    />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Ciniverse",
        "url": "https://ciniverse-movie-app.vercel.app/",
        "description": "ReelNotes experience with trailers, watched ratings, suggestions, and shared notes.",
        "inLanguage": "en-US",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://ciniverse-movie-app.vercel.app/search?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Ciniverse",
        "url": "https://ciniverse-movie-app.vercel.app/",
        "applicationCategory": "EntertainmentApplication",
        "operatingSystem": "Web",
        "description": "Discover popular movies, watch trailers, rate watched titles, and publish ReelNotes.",
        "featureList": [
          "Watch movie trailers",
          "Rate watched movies",
          "Suggest or skip titles",
          "Post ReelNotes"
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
